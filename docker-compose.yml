services:
  # ── Frontend (Nuxt) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: inovai-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NUXT_API_BASE_URL=http://backend:8000/api
    depends_on:
      - backend
    networks:
      - inovai

  # ── Backend (Laravel) ────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: inovai-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend_vendor:/app/vendor
    environment:
      - APP_NAME=InovaiSystem
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=inovai
      - DB_USERNAME=inovai
      - DB_PASSWORD=inovai_secret
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - FRONTEND_URL=http://localhost:3000
      - SANCTUM_STATEFUL_DOMAINS=localhost:3000,localhost:8000
      - SESSION_DOMAIN=localhost
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=admin
      - MINIO_SECRET_KEY=minio_secret
      - MINIO_BUCKET=inovai-nfse
      - MINIO_USE_PATH_STYLE=true
      - NFSE_AMBIENTE=2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - inovai

  # ── PostgreSQL ───────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: inovai-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: inovai
      POSTGRES_USER: inovai
      POSTGRES_PASSWORD: inovai_secret
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inovai"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inovai

  # ── Redis ────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: inovai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - inovai

  # ── MinIO (Object Storage S3) ────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2024-01-13T07-53-03Z-cpuv1
    container_name: inovai-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio_secret
      TZ: America/Sao_Paulo
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inovai

volumes:
  pgdata:
  redisdata:
  miniodata:
  frontend_node_modules:
  backend_vendor:

networks:
  inovai:
    driver: bridge
